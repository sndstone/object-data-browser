name: Release Matrix

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: windows-2022
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: .tmp/toolchains
          key: toolchains-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('scripts/bootstrap.*') }}
      - name: Build Windows MSI
        shell: pwsh
        run: .\scripts\build.ps1 -Platform windows -Arch ${{ matrix.arch }} -Installer msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/windows/*

  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            package: deb
            runs_on: ubuntu-24.04
          - arch: aarch64
            package: deb
            runs_on: ubuntu-24.04-arm
          - arch: x86_64
            package: rpm
            runs_on: ubuntu-24.04
          - arch: aarch64
            package: rpm
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: .tmp/toolchains
          key: toolchains-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('scripts/bootstrap.*') }}
      - name: Build Linux package
        run: ./scripts/build.sh linux ${{ matrix.arch }} ${{ matrix.package }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.package }}-${{ matrix.arch }}
          path: dist/linux/*

  macos:
    runs-on: macos-14
    env:
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
      MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: .tmp/toolchains
          key: toolchains-${{ runner.os }}-${{ hashFiles('scripts/bootstrap.*') }}
      - name: Configure Developer ID signing
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            MACOS_SIGNING_IDENTITY \
            MACOS_TEAM_ID \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_PROVISIONING_PROFILE_BASE64 \
            MACOS_NOTARY_KEY_BASE64 \
            MACOS_NOTARY_KEY_ID \
            MACOS_NOTARY_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required macOS release secret: $name" >&2
              exit 1
            fi
          done
          SIGNING_KEYCHAIN="$RUNNER_TEMP/object-browser-signing.keychain-db"
          SIGNING_KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          PROVISIONING_PATH="$RUNNER_TEMP/embedded.provisionprofile"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROVISIONING_PATH"
          printf '%s' "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          security create-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN"
          security unlock-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security import "$CERTIFICATE_PATH" \
            -k "$SIGNING_KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$SIGNING_KEYCHAIN_PASSWORD" \
            "$SIGNING_KEYCHAIN"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN" login.keychain-db
          echo "MACOS_PROVISIONING_PROFILE=$PROVISIONING_PATH" >> "$GITHUB_ENV"
          echo "MACOS_NOTARY_KEY_FILE=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
      - name: Build macOS arm64 bundle
        run: ./scripts/build.sh macos arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            apps/flutter_app/build/macos/Build/Products/Release/*.app
            dist/macos/*.dmg

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: .tmp/toolchains
          key: toolchains-${{ runner.os }}-${{ hashFiles('scripts/bootstrap.*') }}
      - name: Build Android arm64 artifacts
        run: ./scripts/build.sh android arm64
      - uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            apps/flutter_app/build/app/outputs/flutter-apk/*.apk
            apps/flutter_app/build/app/outputs/bundle/release/*.aab
